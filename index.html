<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuwait Health ID</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JsBarcode -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <!-- HTML5 QRCode Scanner -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'Cairo', 'sans-serif'] },
                    colors: { darkbg: '#0b1120', darkcard: '#162032', kwblue: '#005b9f', kwred: '#ce1126' },
                    animation: { 'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>

    <style>
        body { transition: background-color 0.3s, color 0.3s; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        .fade-in-up { animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(30px); }
        .fade-in { animation: fadeIn 0.3s ease-in forwards; opacity: 0; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }
        
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:active { transform: scale(0.98); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        
        .glass-panel { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .dark .glass-panel { background: rgba(22, 32, 50, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Scanner overrides to fix its default ugly styling */
        #reader { border: none !important; border-radius: 1rem; overflow: hidden; }
        #reader__dashboard_section_csr span { color: white !important; }
        #reader button { background: #005b9f; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-darkbg dark:text-slate-200 min-h-screen flex flex-col pb-20 md:pb-0 relative">

    <!-- Background Decals -->
    <div class="fixed top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-kwblue/10 dark:bg-kwblue/5 rounded-full blur-3xl pointer-events-none -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-kwred/10 dark:bg-kwred/5 rounded-full blur-3xl pointer-events-none -z-10"></div>

    <!-- Burger Menu Button (Fixed Top) -->
    <div class="fixed top-4 ltr:right-4 rtl:left-4 z-50">
        <button onclick="toggleSidebar()" class="glass-panel text-slate-800 dark:text-white w-12 h-12 rounded-xl font-bold shadow-md hover:bg-white dark:hover:bg-slate-800 transition flex items-center justify-center text-xl">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- ================= SIDEBAR MENU ================= -->
    <div id="sidebarOverlay" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] fade-in" onclick="toggleSidebar()"></div>
    <div id="sidebar" class="fixed top-0 ltr:-right-80 rtl:-left-80 w-80 h-full bg-white dark:bg-darkcard shadow-2xl z-[70] transition-all duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b border-slate-100 dark:border-slate-800 flex justify-between items-center bg-slate-50 dark:bg-slate-900/50">
            <h2 class="font-black text-xl text-kwblue dark:text-white flex items-center gap-2"><i class="fas fa-cog"></i> <span data-i18n="menu">Settings</span></h2>
            <button onclick="toggleSidebar()" class="text-slate-400 hover:text-slate-700 dark:hover:text-white w-8 h-8 flex items-center justify-center rounded-full bg-white dark:bg-slate-800 shadow-sm"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6 flex flex-col gap-4 flex-grow">
            <button onclick="toggleLang()" class="w-full text-left ltr:text-left rtl:text-right px-5 py-4 rounded-xl bg-slate-100 dark:bg-slate-800/80 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition flex items-center shadow-sm">
                <i class="fas fa-globe text-kwblue dark:text-kwred text-xl rtl:ml-3 ltr:mr-3"></i> <span id="langLabelMenu">عربي</span>
            </button>
            <button onclick="toggleTheme()" class="w-full text-left ltr:text-left rtl:text-right px-5 py-4 rounded-xl bg-slate-100 dark:bg-slate-800/80 font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition flex items-center shadow-sm">
                <i id="themeIconMenu" class="fas fa-moon text-indigo-500 text-xl rtl:ml-3 ltr:mr-3"></i> <span id="themeLabelMenu">Dark Mode</span>
            </button>
        </div>
        <div class="p-6 border-t border-slate-100 dark:border-slate-800">
            <button onclick="logout()" id="sidebarLogoutBtn" class="hidden w-full bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-black py-4 rounded-xl hover:bg-red-100 dark:hover:bg-red-900/40 transition shadow-sm flex justify-center items-center gap-2">
                <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Logout</span>
            </button>
        </div>
    </div>

    <!-- ================= LOGIN SCREEN ================= -->
    <div id="loginScreen" class="flex-grow flex items-center justify-center p-4 fade-in-up">
        <div class="glass-panel p-8 md:p-12 rounded-[2rem] w-full max-w-md shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-kwblue to-kwred"></div>
            
            <div class="text-center mb-8 pt-4">
                <div class="inline-flex p-4 rounded-2xl bg-white dark:bg-slate-800 shadow-sm mb-4 text-kwblue dark:text-kwred"><i class="fas fa-heartbeat text-5xl"></i></div>
                <h1 class="text-3xl font-black tracking-tight" data-i18n="appTitle">Health ID</h1>
                <p class="text-slate-500 text-sm mt-1 font-semibold" data-i18n="subTitle">State of Kuwait</p>
            </div>
            
            <div id="loginError" class="hidden bg-red-100 dark:bg-red-900/50 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 p-4 mb-5 rounded-xl text-sm font-bold fade-in flex items-center">
                <i class="fas fa-exclamation-circle text-lg rtl:ml-2 ltr:mr-2"></i> <span id="loginErrorMsg">Invalid credentials.</span>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300"><span data-i18n="username">Civil ID / Username</span></label>
                    <div class="relative">
                        <i class="fas fa-id-card absolute top-3.5 ltr:left-4 rtl:right-4 text-slate-400"></i>
                        <input class="w-full ltr:pl-11 rtl:pr-11 ltr:pr-4 rtl:pl-4 py-3 rounded-xl bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 focus:border-kwblue focus:ring-2 focus:ring-kwblue/20 outline-none transition font-mono" id="username" type="text" placeholder="676767676767" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700 dark:text-slate-300"><span data-i18n="password">Password</span></label>
                    <div class="relative">
                        <i class="fas fa-lock absolute top-3.5 ltr:left-4 rtl:right-4 text-slate-400"></i>
                        <input class="w-full ltr:pl-11 rtl:pr-11 ltr:pr-4 rtl:pl-4 py-3 rounded-xl bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700 focus:border-kwblue focus:ring-2 focus:ring-kwblue/20 outline-none transition font-mono" id="password" type="password" value="12345" required>
                    </div>
                </div>
                <button class="w-full bg-gradient-to-r from-kwblue to-blue-700 text-white font-black text-lg py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition mt-2" type="submit"><span data-i18n="loginBtn">Secure Login</span></button>
            </form>
            
            <div class="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700 text-xs font-mono text-slate-500">
                <p class="font-bold mb-2 text-slate-700 dark:text-slate-300" data-i18n="testAccounts">Test Accounts (Pass: 12345)</p>
                <div class="grid grid-cols-1 gap-2">
                    <div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm">👨 Meshari Almutawaah: <b>676767676767</b></div>
                    <div class="bg-blue-50 dark:bg-blue-900/20 p-3 rounded-xl text-kwblue dark:text-blue-300 font-bold border border-blue-100 dark:border-blue-800 shadow-sm">🩺 Doctor: <b>Doctor1</b></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= MAIN PORTAL ================= -->
    <div id="mainPortal" class="hidden flex-col min-h-screen fade-in">
        <nav class="glass-panel shadow-sm sticky top-0 z-40 ltr:pr-20 rtl:pl-20"> <!-- Padding to avoid burger overlap -->
            <div class="max-w-7xl mx-auto px-5 py-4 flex justify-between items-center">
                <div class="font-black text-2xl tracking-tight text-kwblue dark:text-white flex items-center">
                    <i class="fas fa-heartbeat text-kwred rtl:ml-2 ltr:mr-2 text-3xl"></i><span id="navTitle">Portal</span>
                </div>
            </div>
        </nav>

        <!-- Doctor Controls -->
        <div id="doctorControls" class="hidden bg-gradient-to-r from-slate-900 to-slate-800 text-white p-5 shadow-inner">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-3">
                <div class="relative flex-grow">
                    <i class="fas fa-search absolute top-4 ltr:left-4 rtl:right-4 text-slate-400"></i>
                    <input id="searchCivilId" type="tel" placeholder="Enter Patient Civil ID..." class="w-full ltr:pl-12 rtl:pr-12 ltr:pr-4 rtl:pl-4 py-3.5 rounded-xl bg-slate-800 border border-slate-700 focus:border-kwblue text-white font-bold text-lg outline-none transition font-mono">
                </div>
                <div class="flex gap-2 w-full md:w-auto">
                    <button onclick="searchPatient()" class="flex-1 md:flex-none bg-kwblue hover:bg-blue-600 text-white font-bold py-3.5 px-8 rounded-xl transition shadow-lg"><span data-i18n="search">Search</span></button>
                    <button onclick="openScanner()" class="flex-1 md:flex-none bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3.5 px-6 rounded-xl transition shadow-lg flex items-center justify-center gap-2"><i class="fas fa-camera"></i> Scan</button>
                </div>
            </div>
        </div>

        <div id="patientDashboardContent" class="max-w-7xl mx-auto mt-6 px-4 w-full flex-grow pb-10"></div>
    </div>

    <!-- ================= MODALS ================= -->

    <!-- Scanner Modal -->
    <div id="scannerModal" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-4 fade-in">
        <button onclick="closeModals()" class="absolute top-6 ltr:right-6 rtl:left-6 text-white bg-white/10 hover:bg-white/20 w-12 h-12 rounded-full flex items-center justify-center text-xl transition"><i class="fas fa-times"></i></button>
        <div class="text-center mb-6">
            <h3 class="text-white text-2xl font-black mb-2"><i class="fas fa-qrcode text-emerald-400 rtl:ml-2 ltr:mr-2"></i>Scan Barcode</h3>
            <p class="text-slate-400 text-sm">Align the Civil ID barcode within the frame</p>
        </div>
        <div class="bg-white p-2 rounded-2xl w-full max-w-md shadow-2xl relative">
            <div id="reader" class="w-full rounded-xl"></div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 fade-in">
        <div class="bg-white dark:bg-darkcard rounded-[2rem] w-full max-w-md overflow-hidden shadow-2xl">
            <div class="bg-slate-50 dark:bg-slate-800/50 p-5 flex justify-between items-center border-b dark:border-slate-800">
                <h3 class="font-black text-xl"><i class="fas fa-user-cog text-kwblue rtl:ml-2 ltr:mr-2"></i><span data-i18n="myProfile">Profile settings</span></h3>
                <button onclick="closeModals()" class="text-slate-400 hover:text-slate-700 bg-white dark:bg-slate-800 w-8 h-8 rounded-full flex items-center justify-center shadow-sm"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-5 max-h-[65vh] overflow-y-auto" id="profileFormBody"></div>
            <div class="p-5 border-t dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
                <button onclick="saveProfile()" class="w-full py-3.5 bg-kwblue text-white font-black rounded-xl shadow-lg hover:shadow-xl transition" data-i18n="save">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Show Barcode Modal -->
    <div id="showBarcodeModal" class="hidden fixed inset-0 bg-white dark:bg-darkbg z-[110] flex flex-col items-center justify-center p-6 fade-in">
        <button onclick="closeModals()" class="absolute top-6 right-6 text-xl text-slate-800 dark:text-white bg-slate-100 dark:bg-slate-800 w-12 h-12 rounded-full flex items-center justify-center shadow-sm"><i class="fas fa-times"></i></button>
        <div class="text-center mb-10">
            <h2 class="text-3xl font-black text-slate-800 dark:text-white mb-2" data-i18n="showDocBarcode">Show to Doctor</h2>
            <p class="text-slate-500" data-i18n="scanPrompt">Scan this digital ID to access records</p>
        </div>
        <div class="bg-white p-6 rounded-[2rem] shadow-2xl border-4 border-slate-100">
            <svg id="bigBarcodeSvg"></svg>
        </div>
        <p class="mt-8 text-2xl font-mono font-black text-slate-800 dark:text-white tracking-widest bg-slate-100 dark:bg-slate-800 px-6 py-2 rounded-xl" id="bigBarcodeId"></p>
    </div>

    <!-- Generic Action Modal (Doctor Adds) -->
    <div id="genericModal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-end md:items-center justify-center p-0 md:p-4 fade-in">
        <div class="bg-white dark:bg-darkcard w-full md:max-w-lg rounded-t-[2rem] md:rounded-[2rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden transform transition-transform duration-300 translate-y-0">
            <div class="bg-gradient-to-r from-kwblue to-blue-700 p-5 text-white flex justify-between items-center">
                <h3 id="modalTitle" class="font-black text-lg flex items-center gap-2">Action</h3>
                <button onclick="closeModals()" class="text-white/80 hover:text-white bg-white/20 w-8 h-8 rounded-full flex items-center justify-center"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 overflow-y-auto flex-grow space-y-4" id="modalBody"></div>
            <div class="p-5 border-t dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
                <button onclick="submitModalData()" class="w-full py-4 bg-kwblue text-white font-black text-lg rounded-xl shadow-lg active:scale-95 transition" data-i18n="save">Save Entry</button>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT ================= -->
    <script>
        const translations = {
            en: {
                appTitle: "Health ID", subTitle: "State of Kuwait", username: "Civil ID", password: "Password", loginBtn: "Secure Login",
                patientPortal: "Patient Portal", doctorPortal: "Physician Dashboard", logout: "Logout", search: "Search Patient", menu: "Menu", toggleTheme: "Dark Mode",
                allergies: "Allergies", chronic: "Chronic Issues", temp: "Recent Conditions", meds: "Medications & Prescriptions", files: "Lab Results & Files",
                appointments: "Appointments", quickAdd: "Quick Rx", myProfile: "Profile Settings", showDocBarcode: "Digital ID Card", scanPrompt: "Doctor can scan this to open your file", testAccounts: "Test Accounts",
                add: "Add New", save: "Save Entry", noData: "No records found.", family: "Family / Dependents:",
                email: "Email Address", phone: "Mobile Number", trusted: "Trusted Access (Family/Guardians)", trustedName: "Full Name", trustedRel: "Relation",
                date: "Date & Time", dept: "Department", upload: "Upload Document"
            },
            ar: {
                appTitle: "هوية الصحة", subTitle: "دولة الكويت", username: "الرقم المدني", password: "كلمة المرور", loginBtn: "تسجيل الدخول",
                patientPortal: "بوابة المريض", doctorPortal: "لوحة الطبيب", logout: "خروج", search: "بحث عن مريض", menu: "الإعدادات", toggleTheme: "الوضع الداكن",
                allergies: "الحساسية", chronic: "الأمراض المزمنة", temp: "الحالات ال��خيرة", meds: "الأدوية والوصفات", files: "التحاليل والملفات",
                appointments: "المواعيد", quickAdd: "تشخيص سريع", myProfile: "إعدادات الحساب", showDocBarcode: "البطاقة الرقمية", scanPrompt: "أبرز هذا الباركود للطبيب للوصول لملفك", testAccounts: "حسابات تجريبية",
                add: "إضافة", save: "حفظ البيانات", noData: "لا توجد سجلات.", family: "العائلة / التابعين:",
                email: "البريد الإلكتروني", phone: "رقم الهاتف", trusted: "صلاحيات الوصول (أهل/أوصياء)", trustedName: "الاسم الكامل", trustedRel: "صلة القرابة",
                date: "التاريخ والوقت", dept: "القسم", upload: "رفع مستند"
            }
        };

        const dict = { "Common Cold": "زكام", "Fever": "حمى", "Paracetamol": "باراسيتامول", "Ibuprofen": "ايبوبروفين", "General Practice": "طب عام", "Cardiology": "قلبية", "Pediatrics": "أطفال" };
        const catalogs = { temporaryDiseases: ["Common Cold", "Fever", "Headache"], medications: ["Paracetamol", "Ibuprofen", "Amoxicillin"], depts: ["General Practice", "Cardiology", "Pediatrics"] };

        // INITIAL DB SETUP - Load from LocalStorage OR use default
        const defaultData = {
            "Doctor1": { role: "doctor", password: "12345" },
            "676767676767": {
                role: "patient", civilId: "676767676767", name: "Meshari Almutawaah", nameAr: "مشاري المطاوعه",
                age: 18, gender: "Male", genderAr: "ذكر", bloodType: "O+", email: "meshari@example.com", phone: "", password: "12345",
                trusted: [], dependents: [], allergies: [], chronicDiseases: [], temporaryDiseases: [], medications: [], files: [], appointments: []
            }
        };

        // Load data from localStorage to persist changes, or use default
        let patientsDB = JSON.parse(localStorage.getItem('healthIdData')) || defaultData;
        
        // Function to save data to browser storage
        function saveData() {
            localStorage.setItem('healthIdData', JSON.stringify(patientsDB));
        }

        let currentLang = 'en', currentTheme = 'light';
        let loggedInUserId = null; 
        let currentUserRole = null; 
        let currentActiveId = null; 
        let currentModalAction = '';
        let html5QrcodeScanner = null; // for camera

        function t(key) { return translations[currentLang][key] || key; }
        function tr(val) { return currentLang === 'ar' ? (dict[val] || val) : val; }

        // --- SIDEBAR LOGIC ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains(currentLang === 'en' ? 'ltr:-right-80' : 'rtl:-left-80')) {
                // Open
                sidebar.classList.remove('ltr:-right-80', 'rtl:-left-80');
                sidebar.classList.add('ltr:right-0', 'rtl:left-0');
                overlay.classList.remove('hidden');
            } else {
                // Close
                sidebar.classList.add(currentLang === 'en' ? 'ltr:-right-80' : 'rtl:-left-80');
                sidebar.classList.remove('ltr:right-0', 'rtl:left-0');
                overlay.classList.add('hidden');
            }
        }

        function toggleLang() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            
            // Adjust Sidebar position classes based on direction
            const sidebar = document.getElementById('sidebar');
            if(!document.getElementById('sidebarOverlay').classList.contains('hidden')) {
                // if open, reset positioning to the new side
                sidebar.className = `fixed top-0 w-80 h-full bg-white dark:bg-darkcard shadow-2xl z-[70] transition-all duration-300 ease-in-out flex flex-col ltr:right-0 rtl:left-0`;
            } else {
                sidebar.className = `fixed top-0 w-80 h-full bg-white dark:bg-darkcard shadow-2xl z-[70] transition-all duration-300 ease-in-out flex flex-col ltr:-right-80 rtl:-left-80`;
            }

            document.getElementById('langLabelMenu').innerText = currentLang === 'ar' ? 'English' : 'عربي';
            updateUI();
        }
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeIconMenu').className = currentTheme === 'dark' ? 'fas fa-sun text-yellow-400 text-xl rtl:ml-3 ltr:mr-3' : 'fas fa-moon text-indigo-500 text-xl rtl:ml-3 ltr:mr-3';
            document.getElementById('themeLabelMenu').innerText = currentTheme === 'dark' ? (currentLang === 'ar' ? 'الوضع الفاتح' : 'Light Mode') : (currentLang === 'ar' ? 'الوضع الداكن' : 'Dark Mode');
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const k = el.getAttribute('data-i18n'); if(translations[currentLang][k]) el.innerText = translations[currentLang][k];
            });
            document.getElementById('navTitle').innerText = currentUserRole === 'doctor' ? t('doctorPortal') : t('patientPortal');
            if(currentActiveId) renderPatient(currentActiveId);
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            document.getElementById('loginErrorMsg').innerText = msg;
            err.classList.remove('hidden');
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            
            if (!patientsDB[user] || pass !== patientsDB[user].password) { showError(t('loginError')); return; }
            document.getElementById('loginError').classList.add('hidden');
            
            if (patientsDB[user].role === 'doctor') {
                currentUserRole = 'doctor'; loggedInUserId = user;
                switchScreen('mainPortal');
                document.getElementById('doctorControls').classList.remove('hidden');
                document.getElementById('patientDashboardContent').innerHTML = '';
            } else {
                currentUserRole = 'patient'; loggedInUserId = user; currentActiveId = user;
                switchScreen('mainPortal');
                document.getElementById('doctorControls').classList.add('hidden');
                renderPatient(user);
            }
            
            // Show logout in sidebar
            document.getElementById('sidebarLogoutBtn').classList.remove('hidden');
            updateUI();
        }

        function switchScreen(id) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainPortal').classList.add('hidden');
            document.getElementById('mainPortal').classList.remove('flex');
            const el = document.getElementById(id);
            el.classList.remove('hidden');
            if(id==='mainPortal') el.classList.add('flex');
        }

        function logout() { 
            location.reload(); 
        }
        
        function searchPatient() {
            const id = document.getElementById('searchCivilId').value;
            if(patientsDB[id] && patientsDB[id].role === 'patient') { 
                currentActiveId = id; renderPatient(id); 
            } else { 
                alert("Patient not found in database."); 
                document.getElementById('patientDashboardContent').innerHTML = ''; 
            }
        }

        function closeModals() {
            document.getElementById('genericModal').classList.add('hidden');
            document.getElementById('profileModal').classList.add('hidden');
            document.getElementById('showBarcodeModal').classList.add('hidden');
            
            // Stop scanner if active
            if(!document.getElementById('scannerModal').classList.contains('hidden')) {
                if(html5QrcodeScanner) {
                    html5QrcodeScanner.clear().catch(error => { console.error("Failed to clear scanner", error); });
                }
                document.getElementById('scannerModal').classList.add('hidden');
            }
        }

        // --- CAMERA SCANNER LOGIC ---
        function openScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: { width: 250, height: 100 }, aspectRatio: 1.0 }, 
                /* verbose= */ false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Stop scanner
            html5QrcodeScanner.clear().then(() => {
                document.getElementById('scannerModal').classList.add('hidden');
                // Fill search box and trigger search
                document.getElementById('searchCivilId').value = decodedText;
                searchPatient();
            }).catch(error => {
                console.error("Failed to clear html5QrcodeScanner. ", error);
            });
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning
        }

        // --- DOCTOR ACTIONS ---
        function fastAdd(type, val) {
            if(!currentActiveId) return;
            if(!patientsDB[currentActiveId][type].includes(val)) {
                patientsDB[currentActiveId][type].push(val);
                saveData(); // Save to local storage
                renderPatient(currentActiveId);
            }
        }

        function renderPatient(id) {
            const p = patientsDB[id]; const isDoc = currentUserRole === 'doctor';
            const name = currentLang === 'ar' ? p.nameAr : p.name;
            const gender = currentLang === 'ar' ? p.genderAr : p.gender;

            const listUI = (arr, type, color) => arr.length === 0 ? `<p class="text-sm text-slate-400 italic">${t('noData')}</p>` : 
                arr.map((x, i) => `<div class="inline-flex items-center bg-${color}-50 dark:bg-${color}-900/20 text-${color}-700 dark:text-${color}-300 text-sm font-bold px-3 py-1.5 rounded-lg border border-${color}-200 dark:border-${color}-800/50 mb-2 rtl:ml-2 ltr:mr-2 shadow-sm">${tr(x)} ${isDoc?`<button onclick="rm('${id}','${type}',${i})" class="rtl:mr-2 ltr:ml-2 text-${color}-400 hover:text-red-500 bg-white dark:bg-slate-800 rounded-full w-5 h-5 flex justify-center items-center"><i class="fas fa-times text-xs"></i></button>`:''}</div>`).join('');

            const medsUI = p.medications.length === 0 ? `<p class="text-sm text-slate-400 italic">${t('noData')}</p>` :
                p.medications.map((m, i) => `
                    <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4 rounded-2xl mb-3 shadow-sm relative overflow-hidden group card-hover">
                        <div class="absolute left-0 top-0 w-1.5 h-full bg-kwblue"></div>
                        <div class="flex justify-between items-start ltr:pl-3 rtl:pr-3">
                            <div>
                                <h4 class="font-black text-lg text-slate-800 dark:text-white flex items-center"><i class="fas fa-pills text-kwblue rtl:ml-2 ltr:mr-2"></i> ${tr(m.name)} <span class="text-xs bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-2 py-1 rounded ml-2">${m.dosage}</span></h4>
                                <div class="flex gap-3 mt-2 text-xs font-bold text-slate-500 dark:text-slate-400">
                                    <span><i class="fas fa-sync-alt"></i> ${m.freq}</span>
                                    <span><i class="fas fa-hourglass-half"></i> ${m.duration}</span>
                                </div>
                                <p class="text-sm mt-3 bg-blue-50 dark:bg-slate-900/50 p-2 rounded-lg text-slate-700 dark:text-slate-300 border border-blue-100 dark:border-slate-800"><i class="fas fa-info-circle text-kwblue rtl:ml-1 ltr:mr-1"></i> ${m.instructions}</p>
                            </div>
                            ${isDoc ? `<button onclick="rm('${id}','medications',${i})" class="text-slate-400 hover:text-red-500 transition"><i class="fas fa-trash-alt"></i></button>` : ''}
                        </div>
                    </div>`).join('');

            const quickActions = isDoc ? `
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl mb-5 shadow-sm border border-slate-200 dark:border-slate-700">
                    <span class="text-sm font-black text-slate-800 dark:text-white flex items-center gap-2 mb-3"><i class="fas fa-bolt text-yellow-500"></i> ${t('quickAdd')}</span>
                    <div class="flex gap-2 overflow-x-auto hide-scroll pb-1">
                        <button onclick="fastAdd('temporaryDiseases', 'Common Cold')" class="shrink-0 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 text-sm px-4 py-2 rounded-xl font-bold hover:bg-slate-200 transition">+ ${tr('Common Cold')}</button>
                        <button onclick="fastAdd('temporaryDiseases', 'Headache')" class="shrink-0 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 text-sm px-4 py-2 rounded-xl font-bold hover:bg-slate-200 transition">+ ${tr('Headache')}</button>
                        <button onclick="openGenericModal('medications')" class="shrink-0 bg-kwblue/10 text-kwblue text-sm px-4 py-2 rounded-xl font-bold hover:bg-kwblue/20 transition">+ Custom Rx</button>
                    </div>
                </div>` : '';

            document.getElementById('patientDashboardContent').innerHTML = `
                <div class="bg-gradient-to-br from-white to-slate-50 dark:from-darkcard dark:to-slate-800 rounded-[2rem] shadow-xl p-6 md:p-8 border border-white/50 dark:border-slate-700 mb-6 relative overflow-hidden">
                    <div class="absolute right-0 top-0 opacity-5 pointer-events-none text-9xl"><i class="fas fa-notes-medical"></i></div>
                    <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 relative z-10">
                        <div class="flex items-center gap-5">
                            <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-kwblue to-kwred text-white flex items-center justify-center text-3xl shadow-lg border-4 border-white dark:border-slate-700 shrink-0">
                                <i class="fas fa-user"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl md:text-3xl font-black text-slate-800 dark:text-white tracking-tight">${name}</h2>
                                <div class="inline-flex items-center bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-lg mt-2">
                                    <i class="fas fa-fingerprint text-slate-400 rtl:ml-2 ltr:mr-2"></i><span class="font-mono font-bold text-slate-600 dark:text-slate-300">${p.civilId}</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-3 text-center">
                            <div class="bg-white dark:bg-slate-800 px-4 py-2 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700"><span class="block text-xs font-bold text-slate-400">AGE</span><span class="text-lg font-black">${p.age}</span></div>
                            <div class="bg-white dark:bg-slate-800 px-4 py-2 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700"><span class="block text-xs font-bold text-slate-400">SEX</span><span class="text-lg font-black">${gender}</span></div>
                            <div class="bg-white dark:bg-slate-800 px-4 py-2 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700"><span class="block text-xs font-bold text-slate-400">TYPE</span><span class="text-lg font-black text-red-500">${p.bloodType}</span></div>
                        </div>
                    </div>
                    
                    ${!isDoc ? `
                    <div class="flex gap-3 mt-6 pt-6 border-t border-slate-200 dark:border-slate-700 relative z-10">
                        <button onclick="openBigBarcode()" class="flex-1 bg-slate-900 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-black transition flex items-center justify-center gap-2"><i class="fas fa-qrcode"></i> <span data-i18n="showDocBarcode">${t('showDocBarcode')}</span></button>
                    </div>` : ''}
                </div>

                ${quickActions}

                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                    <div class="lg:col-span-5 space-y-6">
                        ${['allergies', 'chronicDiseases', 'temporaryDiseases'].map(cat => {
                            const icons = { allergies: 'fa-exclamation-triangle text-red-500', chronicDiseases: 'fa-heartbeat text-blue-500', temporaryDiseases: 'fa-band-aid text-orange-500' };
                            const colors = { allergies: 'red', chronicDiseases: 'blue', temporaryDiseases: 'orange' };
                            return `
                            <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800">
                                <div class="flex justify-between items-center mb-4">
                                    <h3 class="font-black text-lg text-slate-800 dark:text-white flex items-center gap-2"><i class="fas ${icons[cat]}"></i> ${t(cat.replace('Diseases',''))}</h3>
                                    ${isDoc ? `<button onclick="openGenericModal('${cat}')" class="bg-${colors[cat]}-50 dark:bg-${colors[cat]}-900/30 text-${colors[cat]}-600 w-8 h-8 rounded-full flex items-center justify-center hover:scale-110 transition"><i class="fas fa-plus"></i></button>` : ''}
                                </div>
                                <div class="flex flex-wrap">${listUI(p[cat], cat, colors[cat])}</div>
                            </div>`
                        }).join('')}
                    </div>

                    <div class="lg:col-span-7 space-y-6">
                        <div class="bg-white dark:bg-darkcard p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-800">
                            <div class="flex justify-between items-center mb-5">
                                <h3 class="font-black text-xl text-slate-800 dark:text-white flex items-center gap-2"><i class="fas fa-capsules text-kwblue"></i> ${t('meds')}</h3>
                                ${isDoc ? `<button onclick="openGenericModal('medications')" class="bg-blue-50 dark:bg-blue-900/30 text-kwblue px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-100 transition"><i class="fas fa-plus rtl:ml-1 ltr:mr-1"></i> ${t('add')}</button>` : ''}
                            </div>
                            <div>${medsUI}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function rm(id, cat, i) { 
            if(confirm(currentLang==='ar'?"هل أنت متأكد من الحذف؟":"Confirm deletion?")) {
                patientsDB[id][cat].splice(i,1); 
                saveData(); // Save to local storage
                renderPatient(id); 
            }
        }

        function openBigBarcode() {
            document.getElementById('showBarcodeModal').classList.remove('hidden');
            JsBarcode("#bigBarcodeSvg", currentActiveId, { format: "CODE128", width: 3, height: 120, displayValue: false, background: "#ffffff", lineColor: "#0f172a" });
            document.getElementById('bigBarcodeId').innerText = currentActiveId;
        }

        function openGenericModal(cat) {
            currentModalAction = cat;
            const inputClass = "w-full p-3.5 border border-slate-200 dark:border-slate-700 rounded-xl dark:bg-darkbg focus:border-kwblue focus:ring-2 focus:ring-kwblue/20 outline-none transition";
            const labelClass = "block text-sm font-bold mb-1 mt-4 text-slate-700 dark:text-slate-300";
            
            let title = t(cat.replace('Diseases',''));
            let html = `<label class="${labelClass}">Record Name</label><input type="text" id="mVal" class="${inputClass}" placeholder="Enter detail...">`;
            
            if (cat === 'medications') {
                html = `
                    <label class="${labelClass}">Medication Name</label>
                    <select id="mNameSel" class="${inputClass} mb-2"><option value="">-- Choose Common --</option>${catalogs.medications.map(d=>`<option value="${d}">${tr(d)}</option>`).join('')}</select>
                    <input type="text" id="mNameCust" class="${inputClass}" placeholder="Or type custom name...">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="${labelClass}">Dosage</label><input type="text" id="mDosage" class="${inputClass}" placeholder="e.g. 500mg"></div>
                        <div><label class="${labelClass}">Frequency</label><input type="text" id="mFreq" class="${inputClass}" placeholder="e.g. 2x a day"></div>
                    </div>
                    
                    <label class="${labelClass}">Duration</label><input type="text" id="mDur" class="${inputClass}" placeholder="e.g. 7 days">
                    <label class="${labelClass}">Instructions</label><input type="text" id="mInst" class="${inputClass}" placeholder="e.g. After meals">
                `;
            } 

            document.getElementById('modalTitle').innerHTML = `<i class="fas fa-edit"></i> ${t('add')} ${title}`;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('genericModal').classList.remove('hidden');
        }

        function submitModalData() {
            const p = patientsDB[currentActiveId];
            if (currentModalAction === 'medications') {
                const n = document.getElementById('mNameCust').value.trim() || document.getElementById('mNameSel').value;
                if(n) p.medications.push({ 
                    name: n, dosage: document.getElementById('mDosage').value, freq: document.getElementById('mFreq').value, 
                    duration: document.getElementById('mDur').value, instructions: document.getElementById('mInst').value, date: new Date().toISOString().split('T')[0]
                });
            } else {
                const v = document.getElementById('mVal').value.trim(); if(v) p[currentModalAction].push(v);
            }
            saveData(); // Save to local storage
            closeModals(); renderPatient(currentActiveId);
        }

        updateUI();
    </script>
</body>
</html>
